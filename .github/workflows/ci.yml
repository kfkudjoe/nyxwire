# Nyxwire monorepo CI
# Role: lint + unit test streaming; build all service images.
# Sim policy (SE-005):
#   - Build images: REAL on the runner
#   - Registry push (ACR/GHCR): SIM only — no credentials, no real push
#   - Deploy to K8s / cloud: SIM only
# Never commit secrets. Use GitHub encrypted secret *names* only as placeholders.

name: nyxwire-ci

on:
  push:
    branches: [main, master]
    paths:
      - "services/**"
      - "docker-compose.yaml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "services/**"
      - "docker-compose.yaml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

env:
  IMAGE_PREFIX: nyxwire
  IMAGE_TAG: "0.1.0"

jobs:
  quality:
    name: lint-and-test-streaming
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/streaming
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint (syntax check)
        run: npm run lint

      - name: Unit tests (node --test)
        run: npm test

  image:
    name: docker-build-services
    runs-on: ubuntu-latest
    needs: [quality]
    strategy:
      matrix:
        service: [streaming, history, gateway]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -t "${IMAGE_PREFIX}-${{ matrix.service }}:${IMAGE_TAG}" \
            -t "${IMAGE_PREFIX}-${{ matrix.service }}:sha-${GITHUB_SHA::7}" \
            "./services/${{ matrix.service }}"

      # --- SIM: registry login + push (do NOT enable without secrets policy) ---
      # - name: SIM Login to container registry
      #   run: echo "SIM: docker login would use GH secrets — never paste tokens into YAML"
      #
      # - name: SIM Push image
      #   run: |
      #     echo "SIM: docker tag ${IMAGE_PREFIX}-${{ matrix.service }}:${IMAGE_TAG} \$REGISTRY/..."
      #     echo "SIM: docker push \$REGISTRY/${IMAGE_PREFIX}-${{ matrix.service }}:${IMAGE_TAG}"

      # --- SIM: deploy (book CD path — not run against live cloud) ---
      # - name: SIM Deploy
      #   run: |
      #     echo "SIM: kubectl set image deployment/nyxwire-${{ matrix.service }} ..."
      #     echo "SIM: or helm upgrade / compose on a staging host — never against live Azure here"
