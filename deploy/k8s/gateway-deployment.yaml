apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyxwire-gateway
  namespace: nyxwire
  labels:
    app: nyxwire-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nyxwire-gateway
  template:
    metadata:
      labels:
        app: nyxwire-gateway
    spec:
      containers:
        - name: gateway
          image: nyxwire-gateway:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: STREAMING_URL
              value: http://nyxwire-streaming:3000
            - name: HISTORY_URL
              value: http://nyxwire-history:3000
            - name: SERVICE_NAME
              value: nyxwire-gateway
            - name: PROXY_TIMEOUT_MS
              value: "60000"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: nyxwire-gateway
  namespace: nyxwire
spec:
  type: ClusterIP
  selector:
    app: nyxwire-gateway
  ports:
    - port: 80
      targetPort: 3000
