# Thin RabbitMQ for kind/local only.
# Service name MUST be `rabbit` so RABBIT_URL can use amqp://…@rabbit:5672
#
# LAB CREDS ONLY — default user/pass nyxwire/nyxwire. Never reuse outside this lab.
# Management UI on 15672 (port-forward if needed). Not for production.
# Cloud AKS/GKE/EKS: SIM only — do not apply paid clusters from SE-005 defaults.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbit
  namespace: nyxwire
  labels:
    app: rabbit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbit
  template:
    metadata:
      labels:
        app: rabbit
    spec:
      containers:
        - name: rabbit
          image: rabbitmq:3.13-management-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: amqp
              containerPort: 5672
            - name: management
              containerPort: 15672
          env:
            # LAB ONLY — documented in deploy/k8s/README.md
            - name: RABBITMQ_DEFAULT_USER
              value: nyxwire
            - name: RABBITMQ_DEFAULT_PASS
              value: nyxwire
          readinessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - rabbitmq-diagnostics
                - -q
                - ping
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rabbit
  namespace: nyxwire
  labels:
    app: rabbit
spec:
  selector:
    app: rabbit
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
