# Upload service — orchestrates storage + metadata for video ingest.
# Image: kind load docker-image nyxwire-upload:0.1.0
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nyxwire-upload
  namespace: nyxwire
  labels:
    app: nyxwire-upload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nyxwire-upload
  template:
    metadata:
      labels:
        app: nyxwire-upload
    spec:
      containers:
        - name: upload
          image: nyxwire-upload:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            # In-cluster service DNS (namespace nyxwire)
            - name: STORAGE_URL
              value: http://nyxwire-storage-local:3000
            - name: METADATA_URL
              value: http://nyxwire-metadata:3000
            - name: SERVICE_NAME
              value: nyxwire-upload
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nyxwire-upload
  namespace: nyxwire
spec:
  selector:
    app: nyxwire-upload
  ports:
    - port: 3000
      targetPort: 3000
